<svg viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OFFHAND">
  <g fill="currentColor">
    <!-- ramka i linie (grubość 22) -->
    <rect x="11" y="11" width="658" height="718" fill="none" stroke="currentColor" stroke-width="22"/>
    <rect x="441" y="11" width="22" height="718"/>
    <rect x="11" y="435" width="452" height="22"/>

    <!-- O: pierścień w lewej-górnej komórce -->
    <circle cx="231" cy="228" r="148" fill="none" stroke="currentColor" stroke-width="52"/>

    <!-- FF: lewa-dolna komórka (stem 46, wys. 196) -->
    <rect x="78" y="495" width="46" height="196"/>
    <rect x="78" y="495" width="120" height="46"/>
    <rect x="78" y="575" width="92" height="42"/>
    <rect x="258" y="495" width="46" height="196"/>
    <rect x="258" y="495" width="120" height="46"/>
    <rect x="258" y="575" width="92" height="42"/>

    <!-- HAND: prawa kolumna, pionowo (czytane od dołu) -->
    <g transform="translate(491,695) rotate(-90)">
      <!-- H -->
      <rect x="0" y="0" width="40" height="150"/>
      <rect x="80" y="0" width="40" height="150"/>
      <rect x="0" y="55" width="120" height="40"/>
      <!-- A -->
      <polygon points="170,150 206,150 250,0 214,0"/>
      <polygon points="290,150 254,150 210,0 246,0"/>
      <rect x="192" y="90" width="76" height="34"/>
      <!-- N -->
      <rect x="340" y="0" width="40" height="150"/>
      <rect x="420" y="0" width="40" height="150"/>
      <polygon points="340,0 380,0 460,150 420,150"/>
      <!-- D -->
      <rect x="510" y="0" width="40" height="150"/>
      <path d="M550,10 A 66,66 0 0 1 550,140" fill="none" stroke="currentColor" stroke-width="40"/>
    </g>
  </g>
</svg>
